kind = "web"
previewPath = "/"
title = "Arcade Home Care"
version = "1.0.0"
id = "artifacts/arcade-home-care"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25120

[services.development]
run = "pnpm --filter @workspace/arcade-home-care run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/arcade-home-care", "run", "build" ]
publicDir = "artifacts/arcade-home-care/out"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25120"
